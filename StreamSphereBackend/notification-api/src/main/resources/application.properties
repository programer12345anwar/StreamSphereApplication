spring.application.name=notification-api

server.port=${PORT:${SERVER_PORT:8082}}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME:notification-exchange}
rabbitmq.queue.name=${RABBITMQ_QUEUE_NAME:notification-queue}
rabbitmq.routing.key=${RABBITMQ_ROUTING_KEY:notification-123}

# ? Mail Configurations
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

youtube.platform.name=${PLATFORM_NAME:StreamSphere}
app.platform.base-url=${PLATFORM_BASE_URL:https://yourplatform.com}
app.platform.logo-url=${PLATFORM_LOGO_URL:https://yourplatform.com/logo.png}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
app.docs.external-url=${APP_DOCS_EXTERNAL_URL:https://docs.streamsphere.com/notification}

springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.api-docs.path=${API_DOCS_PATH:/v3/api-docs}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSE:health,info}
management.endpoint.health.probes.enabled=true
