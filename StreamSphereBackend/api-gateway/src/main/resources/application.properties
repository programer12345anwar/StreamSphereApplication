spring.application.name=api-gateway
server.port=${PORT:${SERVER_PORT:8080}}

# Upstream service base URLs
gateway.central.url=${CENTRAL_SERVICE_URL:http://localhost:8084}
gateway.video.url=${VIDEO_SERVICE_URL:http://localhost:8083}
gateway.notification.url=${NOTIFICATION_SERVICE_URL:http://localhost:8082}

# CORS
# Default allowed dev origins: include common dev hosts/ports (vite/dev server)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

# Gateway client tuning
spring.cloud.gateway.httpclient.connect-timeout=${GATEWAY_CONNECT_TIMEOUT_MS:10000}
spring.cloud.gateway.httpclient.response-timeout=${GATEWAY_RESPONSE_TIMEOUT:30s}

# Core API routes
spring.cloud.gateway.routes[0].id=central-user-api
spring.cloud.gateway.routes[0].uri=${gateway.central.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/central/**

spring.cloud.gateway.routes[1].id=central-api
spring.cloud.gateway.routes[1].uri=${gateway.central.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/central/**

spring.cloud.gateway.routes[2].id=video-api
spring.cloud.gateway.routes[2].uri=${gateway.video.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/video/**

spring.cloud.gateway.routes[3].id=notification-api
spring.cloud.gateway.routes[3].uri=${gateway.notification.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications/**

# Swagger and docs routes
spring.cloud.gateway.routes[4].id=central-docs
spring.cloud.gateway.routes[4].uri=${gateway.central.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/docs/central/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[5].id=video-docs
spring.cloud.gateway.routes[5].uri=${gateway.video.url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/docs/video/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[6].id=notification-docs
spring.cloud.gateway.routes[6].uri=${gateway.notification.url}
spring.cloud.gateway.routes[6].predicates[0]=Path=/docs/notification/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=2

# Swagger UI on gateway
springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.api-docs.path=${API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.urls[0].name=Gateway API
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=Central API
springdoc.swagger-ui.urls[1].url=/docs/central/v3/api-docs
springdoc.swagger-ui.urls[2].name=Video API
springdoc.swagger-ui.urls[2].url=/docs/video/v3/api-docs
springdoc.swagger-ui.urls[3].name=Notification API
springdoc.swagger-ui.urls[3].url=/docs/notification/v3/api-docs

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSE:health,info,gateway}
management.endpoint.health.probes.enabled=true

logging.level.org.springframework.cloud.gateway=${GATEWAY_LOG_LEVEL:INFO}
logging.level.com.youtube.api_gateway.configuration=DEBUG
