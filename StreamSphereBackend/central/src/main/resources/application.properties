spring.application.name=central
server.port=${PORT:${SERVER_PORT:8084}}

# RabbitMQ (Connection)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# RabbitMQ (Custom App Config)
rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME:notification-exchange}
rabbitmq.queue.name=${RABBITMQ_QUEUE_NAME:notification-queue}
rabbitmq.routing.key=${RABBITMQ_ROUTING_KEY:notification-123}

# Database - Local Setup
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stream_sphere_application_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Anwar@12345}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Security Key
central.security.secret.key=${CENTRAL_SECRET_KEY:shdgufefjhsdhjgdejfgjfhefgkjfgwfekjfhgerjfegfjergfjegffwknmhfwrek}

# App Config
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
app.docs.external-url=${APP_DOCS_EXTERNAL_URL:https://docs.streamsphere.com/central}

# Swagger Aggregator
springdoc.swagger-ui.urls[0].name=Central API
springdoc.swagger-ui.urls[0].url=${CENTRAL_SWAGGER_DOCS_URL:http://localhost:8084/v3/api-docs}

springdoc.swagger-ui.urls[1].name=Video API
springdoc.swagger-ui.urls[1].url=${VIDEO_SWAGGER_DOCS_URL:http://localhost:8083/v3/api-docs}

springdoc.swagger-ui.urls[2].name=Notification API
springdoc.swagger-ui.urls[2].url=${NOTIFICATION_SWAGGER_DOCS_URL:http://localhost:8082/v3/api-docs}

springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.api-docs.path=${API_DOCS_PATH:/v3/api-docs}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_EXPOSE:health,info}
management.endpoint.health.probes.enabled=true



